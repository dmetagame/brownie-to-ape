name: Publish Codemod

on:
  workflow_dispatch:
  push:
    tags:
      - "brownie-to-ape@v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate package
        run: |
          npm ci
          npm test

      - name: Publish codemod
        uses: codemod/publish-action@v1
        with:
          path: "."
